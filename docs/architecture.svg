<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 940" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b7db1"/>
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c8a45c"/>
    </marker>
    <style>
      .box     { fill:#ffffff; stroke:#4a6fa5; stroke-width:2; }
      .stop    { fill:#fdecec; stroke:#c0392b; stroke-width:2; }
      .term    { fill:#eaf3ea; stroke:#3a7d44; stroke-width:2; }
      .data    { fill:#fbf4e6; stroke:#c8a45c; stroke-width:2; }
      .lbl     { font-size:15px; fill:#1c2b3a; font-weight:600; }
      .sub     { font-size:11.5px; fill:#5a6b7b; }
      .tag     { font-size:10px; fill:#7a8aa0; font-style:italic; }
      .stoplbl { font-size:13px; fill:#c0392b; font-weight:700; }
      .flow    { stroke:#5b7db1; stroke-width:2; fill:none; }
      .dataflow{ stroke:#c8a45c; stroke-width:2; fill:none; stroke-dasharray:5 4; }
      .edgelbl { font-size:11px; fill:#8a6d3b; font-weight:600; }
      .title   { font-size:21px; fill:#1c2b3a; font-weight:700; }
      .legend  { font-size:11px; fill:#5a6b7b; }
    </style>
  </defs>

  <text x="360" y="34" text-anchor="middle" class="title">Clinical Evidence Agent — Pipeline</text>

  <rect x="230" y="58" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="82" text-anchor="middle" class="lbl">Synthetic patient record</text>
  <text x="360" y="99" text-anchor="middle" class="sub">structured JSON &#183; no real data</text>
  <path d="M360,112 L360,146" class="flow" marker-end="url(#arrow)"/>

  <rect x="230" y="148" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="170" text-anchor="middle" class="lbl">Patient completeness check</text>
  <text x="360" y="187" text-anchor="middle" class="tag">plain code &#183; content safe-stop</text>
  <path d="M490,175 L640,175" class="flow" marker-end="url(#arrow)"/>
  <rect x="640" y="149" width="170" height="52" rx="10" class="stop"/>
  <text x="725" y="170" text-anchor="middle" class="stoplbl">SAFE-STOP</text>
  <text x="725" y="188" text-anchor="middle" class="sub">insufficient data</text>
  <path d="M360,202 L360,236" class="flow" marker-end="url(#arrow)"/>

  <rect x="230" y="238" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="260" text-anchor="middle" class="lbl">Summary + PICO question</text>
  <text x="360" y="277" text-anchor="middle" class="tag">plain code &#183; no invented facts</text>
  <path d="M360,292 L360,332" class="flow" marker-end="url(#arrow)"/>
  <text x="368" y="316" class="edgelbl">question + patient context</text>

  <rect x="230" y="334" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="356" text-anchor="middle" class="lbl">Evidence retriever</text>
  <text x="360" y="373" text-anchor="middle" class="tag">patient-aware keyword/tag match</text>
  <path d="M490,361 L640,361" class="flow" marker-end="url(#arrow)"/>
  <rect x="640" y="335" width="170" height="52" rx="10" class="stop"/>
  <text x="725" y="356" text-anchor="middle" class="stoplbl">SAFE-STOP</text>
  <text x="725" y="374" text-anchor="middle" class="sub">no evidence</text>
  <path d="M360,388 L360,428" class="flow" marker-end="url(#arrow)"/>
  <text x="368" y="412" class="edgelbl">ranked evidence cards</text>

  <rect x="230" y="430" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="452" text-anchor="middle" class="lbl">Evidence extractor</text>
  <text x="360" y="469" text-anchor="middle" class="tag">parses allowed / NOT-allowed fences</text>
  <path d="M360,484 L360,524" class="flow" marker-end="url(#arrow)"/>
  <text x="368" y="508" class="edgelbl">structured, cited, fenced claims</text>

  <rect x="230" y="526" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="548" text-anchor="middle" class="lbl">Brief generator</text>
  <text x="360" y="565" text-anchor="middle" class="tag">assembles claims &#183; does not free-write</text>
  <path d="M360,580 L360,620" class="flow" marker-end="url(#arrow)"/>
  <text x="368" y="604" class="edgelbl">draft evidence brief</text>

  <rect x="230" y="622" width="260" height="54" rx="10" class="box"/>
  <text x="360" y="644" text-anchor="middle" class="lbl">Citation verifier</text>
  <text x="360" y="661" text-anchor="middle" class="tag">every claim cited &#183; no forbidden claims</text>
  <path d="M360,676 L360,716" class="flow" marker-end="url(#arrow)"/>
  <text x="368" y="700" class="edgelbl">audited brief (PASS / FLAGGED)</text>

  <rect x="230" y="718" width="260" height="54" rx="10" class="term"/>
  <text x="360" y="740" text-anchor="middle" class="lbl">Clinician-facing evidence brief</text>
  <text x="360" y="757" text-anchor="middle" class="sub">structured &#183; cited &#183; auditable</text>
  <path d="M360,772 L360,806" class="flow" marker-end="url(#arrow)"/>

  <rect x="230" y="808" width="260" height="54" rx="10" class="term"/>
  <text x="360" y="838" text-anchor="middle" class="lbl">Human clinician review</text>

  <!-- side input: evidence library -->
  <rect x="30" y="360" width="160" height="98" rx="10" class="data"/>
  <text x="110" y="386" text-anchor="middle" class="lbl">Evidence library</text>
  <text x="110" y="405" text-anchor="middle" class="sub">6 curated cards</text>
  <text x="110" y="421" text-anchor="middle" class="sub">user-authored summaries</text>
  <text x="110" y="437" text-anchor="middle" class="sub">+ citations &amp; fences</text>
  <text x="110" y="452" text-anchor="middle" class="tag">copyright-safe</text>
  <path d="M190,382 C214,382 208,361 228,361" class="dataflow" marker-end="url(#arrowData)"/>
  <path d="M190,436 C214,436 206,457 228,457" class="dataflow" marker-end="url(#arrowData)"/>

  <!-- orchestrator side note -->
  <line x1="215" y1="148" x2="215" y2="676" stroke="#9bb0c9" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="208" y="412" text-anchor="middle" class="sub" transform="rotate(-90 208 412)">coordinated by run_pipeline() orchestrator</text>

  <!-- legend -->
  <rect x="640" y="470" width="300" height="152" rx="8" fill="#fafbfc" stroke="#d5dde5" stroke-width="1"/>
  <text x="655" y="492" class="lbl" font-size="13">Legend</text>
  <rect x="655" y="504" width="18" height="14" rx="3" class="box"/>
  <text x="682" y="516" class="legend">pipeline component (plain code)</text>
  <rect x="655" y="526" width="18" height="14" rx="3" class="data"/>
  <text x="682" y="538" class="legend">curated data source</text>
  <rect x="655" y="548" width="18" height="14" rx="3" class="stop"/>
  <text x="682" y="560" class="legend">safe-stop (system declines)</text>
  <rect x="655" y="570" width="18" height="14" rx="3" class="term"/>
  <text x="682" y="582" class="legend">output / human step</text>
  <line x1="657" y1="600" x2="675" y2="600" class="dataflow"/>
  <text x="682" y="604" class="legend">data input to a component</text>

  <text x="360" y="895" text-anchor="middle" class="tag">Every medical claim in the brief traces to a curated source &#8212; nothing is free-written by a model.</text>
</svg>
